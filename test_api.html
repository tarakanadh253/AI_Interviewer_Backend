<!DOCTYPE html>
<html>
<head>
    <title>Test Topics API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Topics API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing...</p>';

            try {
                const response = await fetch('http://localhost:8000/api/topics/');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    resultDiv.innerHTML = `
                        <div class="status success">
                            <h3>✅ Success! Found ${data.length} topics:</h3>
                            <ul>
                                ${data.map(topic => `<li><strong>${topic.name}</strong> - ${topic.question_count} questions</li>`).join('')}
                            </ul>
                        </div>
                        <h3>Raw JSON Response:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="status error">
                            <h3>⚠️ API responded but no topics found</h3>
                            <p>You need to run: <code>python manage.py seed_data</code></p>
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">
                        <h3>❌ Error connecting to backend</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Solution:</strong> Make sure the backend server is running:</p>
                        <code>python manage.py runserver</code>
                    </div>
                `;
            }
        }

        // Auto-test on page load
        window.onload = testAPI;
    </script>
</body>
</html>
